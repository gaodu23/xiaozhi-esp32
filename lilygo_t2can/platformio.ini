[env:lilygo_t2can]
platform = espressif32
board = esp32dev
framework = arduino

; LilyGO T2-CAN uses ESP32 with TWAI CAN controller
; Verify exact GPIO pins from the T2-CAN schematic before flashing

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_ESP32_DEV

lib_deps =
    ; PS4 controller via Classic Bluetooth
    https://github.com/aed3/PS4-esp32.git
    ; Async HTTP server for web UI
    ESP Async WebServer
    ; LittleFS for serving web files from flash
    lorol/LittleFS_esp32

monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
